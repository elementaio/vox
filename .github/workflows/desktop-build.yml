# Builds the Vox desktop app (v1 = a lean CLIENT that connects to a hosted relay)
# into installers on native per-OS runners.
#
# Because v1 no longer bundles the arch-specific Elixir relay, the mac build is a
# single UNIVERSAL dmg (runs on both Intel and Apple Silicon) built on macos-14 —
# so we never touch the flaky/retired `macos-13` Intel runner.
#
# Trigger manually (Actions → this workflow → Run), or push a v* tag. Builds are
# UNSIGNED (identity:null); add Apple/Windows signing + notarization secrets later
# for distribution without Gatekeeper warnings.
name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Needed so a tagged run can publish a GitHub Release with the installers attached.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # one universal dmg for Intel + Apple Silicon
            builder: --mac --universal
            artifact: vox-desktop-mac
          - os: windows-latest
            builder: --win --x64
            artifact: vox-desktop-windows
          - os: ubuntu-latest
            builder: --linux --x64
            artifact: vox-desktop-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps (web + sdk)
        run: pnpm install --no-frozen-lockfile

      - name: Build web client
        run: pnpm --filter web build

      - name: Install desktop deps (electron + builder)
        working-directory: apps/desktop
        run: npm install

      - name: Package installer
        working-directory: apps/desktop
        run: npx electron-builder ${{ matrix.builder }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: warn
          path: |
            apps/desktop/out/*.dmg
            apps/desktop/out/*.exe
            apps/desktop/out/*.AppImage
            apps/desktop/out/*.zip

      # On a v* tag, attach this platform's installer to a (draft) GitHub Release;
      # each matrix job appends to the same release.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            apps/desktop/out/*.dmg
            apps/desktop/out/*.exe
            apps/desktop/out/*.AppImage
